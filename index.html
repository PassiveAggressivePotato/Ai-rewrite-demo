<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06070c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="description" content="Universal review aggregation for movies, TV, games and books — every source normalized onto one 100-point scale." />
<meta name="robots" content="noindex, nofollow" />
<title>Universal Entertainment Scores</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon.svg" />

<!-- Fonts: display + body. The app still works if these fail to load. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The entire app is rendered into here by app.js -->
  <div id="app"></div>

  <!-- Portrait-only gate. Installed PWA locks via the manifest; in a browser tab
       (where the orientation API can't lock) this overlay covers the app when a
       phone is held in landscape. CSS-only; hidden on tablets/desktop. -->
  <div class="rotate-gate" aria-hidden="true">
    <div class="rotate-gate-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="7" y="2.5" width="10" height="19" rx="2"/><path d="M10 19h4"/><path d="M2.5 9a5 5 0 0 1 5-5"/><path d="M2.5 9 1 7.5M2.5 9 4 7.5"/></svg>
      <p>Rotate to portrait</p>
    </div>
  </div>

  <!-- Shared SVG gradient defs for the flat category icons + metallic logo. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <radialGradient id="gi-gold" cx="0.38" cy="0.3" r="0.85">
        <stop offset="0" stop-color="#fff0cf"/><stop offset="0.45" stop-color="#f3cd76"/>
        <stop offset="0.8" stop-color="#dca63f"/><stop offset="1" stop-color="#a9761f"/>
      </radialGradient>
      <linearGradient id="gi-movie" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe09a"/><stop offset="1" stop-color="#d4942a"/></linearGradient>
      <linearGradient id="gi-tv" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8fd0ff"/><stop offset="1" stop-color="#2f74d8"/></linearGradient>
      <linearGradient id="gi-game" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#caa6ff"/><stop offset="1" stop-color="#7a3fe0"/></linearGradient>
      <linearGradient id="gi-book" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9fb0"/><stop offset="1" stop-color="#d23b5e"/></linearGradient>
      <linearGradient id="logo-gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fdecc0"/><stop offset="0.32" stop-color="#f4cf72"/>
        <stop offset="0.55" stop-color="#e3ad44"/><stop offset="1" stop-color="#b9791f"/>
      </linearGradient>
      <!-- Icon outline: dilate the alpha, subtract the original to get a ring that
           respects holes, flood it with the element's `color`, draw under the icon. -->
      <filter id="io-05" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="0.5" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="io-1" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="1" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="io-15" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="io-2" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="2" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="io-3" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="3" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="io-4" x="-50%" y="-50%" width="200%" height="200%"><feMorphology in="SourceAlpha" operator="dilate" radius="4" result="d"/><feComposite in="d" in2="SourceAlpha" operator="out" result="ring"/><feFlood flood-color="currentColor"/><feComposite in2="ring" operator="in" result="ol"/><feMerge><feMergeNode in="ol"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
  </svg>


  <script type="module" src="app.js"></script>
  <script>
    /* Register the service worker for offline / installable PWA behaviour.
       Guarded so it never breaks file:// or older browsers. */
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
