name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish being superseded
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (web assets for both apps)
        run: |
          mkdir -p _site
          # Flagship app at the site root
          cp index.html styles.css app.js config.js sources.js normalize.js data.js \
             manifest.webmanifest sw.js _site/
          cp -r icons _site/
          # Orrery preserved at /orrery/
          mkdir -p _site/orrery
          cp orrery/index.html orrery/styles.css orrery/app.js orrery/data.js _site/orrery/

      - name: Configure Pages (self-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
