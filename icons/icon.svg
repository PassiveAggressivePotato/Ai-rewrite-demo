<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12131d"/>
      <stop offset="1" stop-color="#06070c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c469"/>
      <stop offset="1" stop-color="#c98f30"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- normalized-score dial motif -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="26"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="26"
          stroke-linecap="round" stroke-dasharray="942" stroke-dashoffset="160"
          transform="rotate(-90 256 256)"/>
  <text x="256" y="290" text-anchor="middle" font-family="Sora, system-ui, sans-serif"
        font-size="120" font-weight="800" fill="url(#gold)">S</text>
</svg>
